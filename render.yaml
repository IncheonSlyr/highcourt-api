services:
  - type: web
    name: highcourt-api
    runtime: docker
    plan: starter
    dockerfilePath: ./Dockerfile
    autoDeploy: true
    envVars:
      - key: PORT
        value: 3000
      - key: DB_PATH
        value: /opt/render/project/data/highcourt.db
    disk:
      name: highcourt-data
      mountPath: /opt/render/project/data
      sizeGB: 1
